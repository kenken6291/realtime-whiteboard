<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>リアルタイム・ホワイトボード</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ルーム参加画面 -->
  <div id="joinScreen" class="join-screen">
    <div class="join-card">
      <h1>📝 リアルタイム・ホワイトボード</h1>
      <p class="join-desc">ルームIDを入力して参加してください。<br>同じIDを共有した人と、描画がリアルタイムに同期されます。</p>
      <input type="text" id="roomInput" placeholder="例: team-meeting-0714" maxlength="64" autocomplete="off">
      <button id="joinBtn">ルームに入る</button>
      <p class="join-hint">※ 存在しないルームIDでも自動的に新規作成されます</p>
    </div>
  </div>

  <!-- ホワイトボード画面 -->
  <div id="boardScreen" class="board-screen hidden">
    <header class="toolbar">
      <div class="toolbar-group">
        <span class="room-label">ルーム: <strong id="roomNameLabel"></strong></span>
        <button id="copyLinkBtn" title="ルームへの招待リンクをコピー">🔗 リンク</button>
      </div>

      <div class="toolbar-group">
        <button id="penBtn" class="tool-btn active" title="ペン">✏️ ペン</button>
        <button id="eraserBtn" class="tool-btn" title="消しゴム">🧹 消しゴム</button>
        <button id="textBtn" class="tool-btn" title="テキスト入力">📝 文字</button>
        <button id="panBtn" class="tool-btn" title="画面を移動">✋ 移動</button>
      </div>

      <div class="toolbar-group">
        <label class="tool-label">色</label>
        <input type="color" id="colorPicker" value="#1a1a1a">
        <label class="tool-label" id="widthLabel">太さ</label>
        <input type="range" id="widthPicker" min="1" max="30" value="4">
        <span id="widthValue">4</span>
      </div>

      <div class="toolbar-group zoom-group">
        <button id="zoomOutBtn" class="tool-btn small" title="縮小">－</button>
        <span id="zoomLevel">100%</span>
        <button id="zoomInBtn" class="tool-btn small" title="拡大">＋</button>
        <button id="fitBtn" class="tool-btn small" title="全体表示に戻す">⟳ 全体</button>
        <button id="fullscreenBtn" class="tool-btn small" title="全画面表示">🔲 全画面</button>
      </div>

      <div class="toolbar-group">
        <button id="clearBtn" class="tool-btn danger">🗑️ 全消去</button>
      </div>

      <div class="toolbar-group status-group">
        <span id="statusDot" class="status-dot"></span>
        <span id="statusText">接続中...</span>
      </div>
    </header>

    <main class="canvas-wrap" id="canvasWrap">
      <canvas id="board"></canvas>
    </main>
  </div>

<script src="main.js"></script>
</body>
</html>
